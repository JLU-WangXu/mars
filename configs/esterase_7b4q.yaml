      L: 2.5
      I: 2.2
      V: 1.4
    61:
      F: 1.2
    121:
      Q: 1.1
      N: 0.8
      E: 0.5
    123:
      F: 1.2

evolution:
  homologs_fasta: "datasets/evolution_train/esterase_env_pairs/positive.fasta"

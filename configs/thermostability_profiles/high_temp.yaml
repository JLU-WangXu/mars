# High Temperature Stable Design Configuration
# Optimized for proteins requiring stability at elevated temperatures (60-100C)
# Thermostability profile for industrial enzyme applications

thermostability:
  profile_type: "high_temperature"
  target_temp_range:
    min_celsius: 60
    max_celsius: 100
    optimal_celsius: 80
  design_strategy:
    core_stabilization: true
    surface_desolvation: true
    proline_enrichment: true
    arginine_lysine_ratio: 1.2

  # Amino acid composition guidelines for thermal stability
  aa_preferences:
    increase:
      - "P"  # Proline - restricts flexibility, increases rigidity
      - "V"  # Valine - small hydrophobic, stabilizes core
      - "I"  # Isoleucine - beta-branched, thermal stability
      - "W"  # Tryptophan - aromatic stacking, hydrophobic core
      - "Y"  # Tyrosine - polar aromatic, hydrogen bonding
      - "F"  # Phenylalanine - aromatic, core packing
      - "R"  # Arginine - salt bridges, hydrogen bonding
    decrease:
      - "M"  # Methionine - oxidizable, destabilizing at high T
      - "C"  # Cysteine - disulfide bonds preferred but limited
      - "S"  # Serine - flexible, reduces stability
      - "T"  # Threonine - flexible side chains
      - "N"  # Asparagine - deamidation risk at high T
      - "Q"  # Glutamine - deamidation risk

  # Structural constraints
  structural_constraints:
    min_proline_positions: 3
    max_flexible_gaps: 2
    diselenide_crosslinks: 0  # Prefer disulfides at moderate T
    salt_bridge_density: 1.5  # Enhanced ionic interactions

  # Scoring adjustments for high-temperature design
  score_modifiers:
    proline_bias: 1.4
    hydrophobic_core_bonus: 1.3
    aromatic_interaction_bonus: 1.2
    salt_bridge_bonus: 1.1
    flexibility_penalty: 0.7
    methionine_penalty: 0.5
    asparagine_penalty: 0.4

generation:
  sampling_temp: "0.05 0.1"  # Lower temperature for stable sequences
  num_seq_per_target: 30
  esm_if:
    enabled: true
    num_samples: 12
    temperature: 5.0e-7
    nogpu: false

method:
  score_weights:
    oxidation: 0.8
    surface: 0.6
    manual: 1.5
    evolution: 0.7
    burden: 1.4
    thermostability: 2.0

evolution:
  homologs_fasta: ""
  aligned_fasta: ""
  min_identity: 0.25  # Higher threshold for thermophile homologs

validation:
  required_checks:
    - "proline_content"
    - "aromatic_content"
    - "hydrophobicity"
    - "thermal_estimate"
  thresholds:
    min_proline: 4.0  # Minimum proline percentage
    max_flexibility: 0.35
    min_aromatic: 8.0
    est_thermal_tm: 70.0  # Estimated Tm in Celsius
